# Rime schema
# encoding: utf-8
#
# 这是独立的「简体增强」方案：
# 1) 默认简体（simplification reset=1）
# 2) 启用 emoji_suggestion 过滤器
# 3) 启用 lua_translator@date_time（rq/sj/dt/xq）

schema:
  schema_id: hank_luna_pinyin
  name: 朙月拼音·简体增强
  version: "0.1"
  author:
    - hank
  description: |
    基于朙月拼音，增加 emoji 与日期时间快捷输入。
  dependencies:
    - stroke

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    reset: 0
    states: [ 半角, 全角 ]
  - name: simplification
    reset: 1
    states: [ 漢字, 汉字 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: emoji_suggestion
    reset: 1
    states: [ "🈚︎", "🈶️" ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator@custom_phrase
    - reverse_lookup_translator
    - script_translator
    - lua_translator@date_time
  filters:
    - simplifier@emoji_suggestion
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    __patch:
      - pinyin:/abbreviation
      - pinyin:/spelling_correction
      - pinyin:/key_correction

translator:
  dictionary: luna_pinyin
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 1

reverse_lookup:
  dictionary: stroke
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: 〔筆畫〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/
  comment_format:
    - xform/([nl])v/$1ü/

emoji_suggestion:
  opencc_config: emoji.json
  option_name: emoji_suggestion
  tips: none
  inherit_comment: false

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings/+:
    # 快捷键：Control+Shift+E 切换 emoji
    - { when: always, accept: Control+Shift+E, toggle: emoji_suggestion }

recognizer:
  import_preset: default
  patterns:
    punct: '^/([0-9]0?|[A-Za-z]+)$'
    reverse_lookup: "`[a-z]*'?$"

__patch:
  # 使用八股文语言模型（与官方朙月拼音一致）
  - grammar:/hant?
