# Rime schema
# encoding: utf-8
#
# 关键说明：
# - 系统自带 luna_pinyin_simp.schema.yaml 默认不会加载 luna_pinyin_simp.custom.yaml。
# - 这里在用户目录提供同名 schema，保持原有行为同时追加 custom patch 入口。
# - 这样 emoji_suggestion、lua_translator@date_time 等写在 luna_pinyin_simp.custom.yaml 才会生效。

__include: luna_pinyin.schema:/

schema:
  schema_id: luna_pinyin_simp
  name: 朙月拼音·简化字
  version: "0.30"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    朙月拼音，简化字输出模式（用户增强版）。

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: zh_simp
    reset: 1
    states: [ 漢字, 汉字 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

translator:
  prism: luna_pinyin_simp

simplifier:
  option_name: zh_simp

key_binder:
  bindings/+:
    - { when: always, accept: Control+Shift+4, toggle: zh_simp }
    - { when: always, accept: Control+Shift+dollar, toggle: zh_simp }

__patch:
  # 关键：显式加载用户补丁，确保 emoji / Lua / easy_en 可生效
  - luna_pinyin_simp.custom:/patch?
